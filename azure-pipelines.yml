# 🚫 Disable automatic triggers
trigger: none
pr: none

# 🧩 Optional parameter (kept for future use)
parameters:
- name: workingDirectory
  displayName: "Select Terraform Folder"
  type: string
  default: "Francis"
  values:
  - Francis
  - Safi
  - Raj

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Disabled
  displayName: "Pipeline Disabled"
  jobs:
  - job: NoOp
    steps:
    - script: |
        echo "🚫 Pipeline is currently disabled."
        echo "Use local Terraform CLI for now."
      displayName: "No Operation"